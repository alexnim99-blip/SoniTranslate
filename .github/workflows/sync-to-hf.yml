name: Sync to Hugging Face Space

on:
  push:
    branches: [main] # Change 'main' to 'master' if your default branch is master
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true # Set to false if you don't use Git LFS for large files

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add huggingface https://sumnim203:$HF_TOKEN@huggingface.co/spaces/sumnim203/video-dube
          git push --force huggingface main
